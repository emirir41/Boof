<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sepetim | Highly Boof</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400..800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root{
    --bg: #0a0a0f;
    --glass: rgba(255,255,255,0.05);
    --glass-border: rgba(255,255,255,0.10);
    --indigo: #6366f1;
    --violet: #8b5cf6;
    --text: #f2f2f7;
    --text-dim: #9797a8;
    --danger: #ef4444;
    --success: #22c55e;
    --radius: 20px;
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  body{
    background:
      radial-gradient(circle at 15% 0%, rgba(99,102,241,0.16), transparent 45%),
      radial-gradient(circle at 85% 20%, rgba(139,92,246,0.14), transparent 40%),
      var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding-bottom: 130px;
  }

  .geri-link{
    position: fixed;
    top: 20px;
    left: 20px;
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
    text-decoration: none;
    font-size: 18px;
    z-index: 50;
  }

  header{
    padding: 40px 24px 24px;
    text-align: center;
  }

  .star{
    color: var(--violet);
    font-size: 20px;
    display:block;
    margin-bottom: 8px;
  }

  h1{
    font-family:'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(28px, 6vw, 40px);
    letter-spacing: -0.02em;
    background: linear-gradient(90deg, #fff, #c4c4ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  header p{
    color: var(--text-dim);
    margin-top: 8px;
    font-size: 14px;
  }

  main{
    max-width: 720px;
    margin: 24px auto 0;
    padding: 0 24px;
  }

  #urun-listesi{
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .satir{
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    backdrop-filter: blur(14px);
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px;
  }

  .satir-info{
    flex: 1;
    min-width: 0;
  }
  .satir-info h3{
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 3px;
  }
  .satir-info .birim-fiyat{
    color: var(--text-dim);
    font-size: 12px;
  }

  .adet-kontrol{
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    padding: 6px 10px;
  }

  .adet-btn{
    width: 26px;
    height: 26px;
    border-radius: 8px;
    border: none;
    background: rgba(255,255,255,0.08);
    color: var(--text);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .adet-btn:active{ transform: scale(0.92); }

  .adet-sayi{
    min-width: 18px;
    text-align: center;
    font-weight: 700;
    font-size: 14px;
  }

  .satir-tutar{
    font-weight: 800;
    font-size: 14px;
    min-width: 64px;
    text-align: right;
  }

  .sil-btn{
    width: 32px;
    height: 32px;
    border-radius: 10px;
    border: 1px solid var(--glass-border);
    background: transparent;
    color: var(--danger);
    font-size: 15px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .sil-btn:active{ transform: scale(0.92); }

  .state{
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .state .star{ margin-bottom: 14px; }
  .state h3{
    font-family:'Syne', sans-serif;
    color: var(--text);
    font-size: 18px;
    margin-bottom: 6px;
  }
  .state a{
    display: inline-block;
    margin-top: 18px;
    padding: 12px 22px;
    border-radius: 12px;
    background: linear-gradient(90deg, var(--indigo), var(--violet));
    color: #fff;
    text-decoration: none;
    font-weight: 700;
    font-size: 13px;
  }

  .not-alani{
    margin-top: 24px;
  }
  .not-alani label{
    display: block;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 8px;
  }
  #siparis-notu{
    width: 100%;
    min-height: 90px;
    padding: 14px;
    border-radius: 14px;
    border: 1px solid var(--glass-border);
    background: var(--glass);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    resize: vertical;
    outline: none;
    backdrop-filter: blur(12px);
  }
  #siparis-notu:focus{ border-color: var(--indigo); }
  #siparis-notu::placeholder{ color: var(--text-dim); }

  /* Alt onay barı */
  #onay-bar{
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 16px 20px;
    padding-bottom: calc(16px + env(safe-area-inset-bottom));
    background: rgba(16,16,24,0.9);
    border-top: 1px solid var(--glass-border);
    backdrop-filter: blur(20px);
    z-index: 100;
  }

  .onay-ozet{
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 720px;
    margin: 0 auto 12px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .onay-ozet .tutar{
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    color: var(--text);
  }

  #onayla-btn{
    display: block;
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
    padding: 17px;
    border-radius: 16px;
    border: none;
    background: linear-gradient(90deg, var(--indigo), var(--violet));
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 15px;
    cursor: pointer;
    transition: opacity .2s, transform .15s;
  }
  #onayla-btn:active{ transform: scale(0.98); }
  #onayla-btn:disabled{
    opacity: 0.6;
    cursor: not-allowed;
  }

  /* Onay overlay */
  #onay-overlay{
    position: fixed;
    inset: 0;
    background: rgba(6,6,10,0.92);
    backdrop-filter: blur(6px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    text-align: center;
    padding: 24px;
  }
  #onay-overlay.gorunur{
    display: flex;
  }

  .check-circle{
    width: 84px;
    height: 84px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--indigo), var(--violet));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    margin: 0 auto 22px;
    animation: pop .5s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes pop{
    0%{ transform: scale(0); opacity: 0; }
    60%{ transform: scale(1.1); opacity: 1; }
    100%{ transform: scale(1); }
  }

  #onay-overlay h2{
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 24px;
    margin-bottom: 8px;
  }
  #onay-overlay p{
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 26px;
  }

  @media (prefers-reduced-motion: reduce){
    .adet-btn, .sil-btn, #onayla-btn{ transition: none; }
    .check-circle{ animation: none; }
  }
</style>
</head>
<body>

<a class="geri-link" id="geri-btn" href="index.html" aria-label="Geri dön">←</a>

<header>
  <span class="star">✦</span>
  <h1>Sepetim</h1>
  <p id="restoran-adi-alt">Siparişini gözden geçir</p>
</header>

<main>
  <div id="urun-listesi">
    <!-- JS ile doldurulacak -->
  </div>

  <div class="not-alani" id="not-blogu" style="display:none;">
    <label for="siparis-notu">Sipariş Notu</label>
    <textarea id="siparis-notu" placeholder="Ekstra istek, alerji, kapı kodu vb. (opsiyonel)"></textarea>
  </div>
</main>

<div id="onay-bar" style="display:none;">
  <div class="onay-ozet">
    <span id="onay-adet">0 ürün</span>
    <span class="tutar" id="onay-tutar">0.00 ₺</span>
  </div>
  <button id="onayla-btn">Siparişi Onayla ve Gönder</button>
</div>

<div id="onay-overlay">
  <div>
    <div class="check-circle">✓</div>
    <h2>Siparişin alındı!</h2>
    <p>Dükkan siparişini hazırlamaya başlıyor. Takip için bildirimlerini açık tut.</p>
    <a href="index.html" style="display:inline-block; padding:13px 24px; border-radius:14px; background:linear-gradient(90deg,#6366f1,#8b5cf6); color:#fff; text-decoration:none; font-weight:700; font-size:14px;">Ana Sayfaya Dön</a>
  </div>
</div>

<script>
  // --- Supabase bağlantısı ---
  const SUPABASE_URL = 'https://ttuxfivcwdpyvhmybbna.supabase.co';
  const SUPABASE_ANON_KEY = 'SENIN_ANON_KEY_BURAYA';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const SEPET_ANAHTARI = 'boof_sepet';

  const listeEl = document.getElementById('urun-listesi');
  const notBlogu = document.getElementById('not-blogu');
  const notEl = document.getElementById('siparis-notu');
  const onayBar = document.getElementById('onay-bar');
  const onayAdetEl = document.getElementById('onay-adet');
  const onayTutarEl = document.getElementById('onay-tutar');
  const onaylaBtn = document.getElementById('onayla-btn');
  const onayOverlay = document.getElementById('onay-overlay');
  const geriBtn = document.getElementById('geri-btn');
  const restoranAdiAlt = document.getElementById('restoran-adi-alt');

  // --- URL'den restoran_id oku ---
  function restoranIdAl(){
    const params = new URLSearchParams(window.location.search);
    const ham = params.get('restoran_id');
    const id = Number(ham);
    if (!ham || Number.isNaN(id) || id <= 0) return null;
    return id;
  }

  const restoranId = restoranIdAl();

  if (restoranId === null){
    window.location.href = 'index.html';
  } else {
    geriBtn.href = `gelal.html?restoran_id=${restoranId}`;
  }

  // --- localStorage yardımcıları ---
  function tumSepetiOku(){
    try{
      const ham = localStorage.getItem(SEPET_ANAHTARI);
      return ham ? JSON.parse(ham) : [];
    }catch(e){ return []; }
  }

  function tumSepetiYaz(sepet){
    localStorage.setItem(SEPET_ANAHTARI, JSON.stringify(sepet));
  }

  // Sadece bu restorana ait satırlar
  function buRestoranSepeti(){
    return tumSepetiOku().filter(s => s.restoran_id === restoranId);
  }

  function satirGuncelle(urunId, delta){
    const tumSepet = tumSepetiOku();
    const satir = tumSepet.find(s => s.urun_id === urunId && s.restoran_id === restoranId);
    if (!satir) return;
    satir.adet += delta;
    const yeniSepet = satir.adet <= 0
      ? tumSepet.filter(s => !(s.urun_id === urunId && s.restoran_id === restoranId))
      : tumSepet;
    tumSepetiYaz(yeniSepet);
    ciz();
  }

  function satirSil(urunId){
    const tumSepet = tumSepetiOku().filter(s => !(s.urun_id === urunId && s.restoran_id === restoranId));
    tumSepetiYaz(tumSepet);
    ciz();
  }

  function bosDurumGoster(){
    listeEl.innerHTML = `
      <div class="state">
        <span class="star">✦</span>
        <h3>Sepetin boş</h3>
        <p>Bu dükkandan henüz ürün eklemedin.</p>
        <a href="gelal.html?restoran_id=${restoranId}">Menüye Dön</a>
      </div>`;
    notBlogu.style.display = 'none';
    onayBar.style.display = 'none';
  }

  function satirOlustur(s){
    const el = document.createElement('div');
    el.className = 'satir';
    const tutar = (s.fiyat * s.adet).toFixed(2);
    el.innerHTML = `
      <div class="satir-info">
        <h3>${s.isim}</h3>
        <div class="birim-fiyat">${Number(s.fiyat).toFixed(2)} ₺ / adet</div>
      </div>
      <div class="adet-kontrol">
        <button class="adet-btn eksi">−</button>
        <span class="adet-sayi">${s.adet}</span>
        <button class="adet-btn arti">+</button>
      </div>
      <div class="satir-tutar">${tutar} ₺</div>
      <button class="sil-btn">✕</button>
    `;
    el.querySelector('.eksi').addEventListener('click', () => satirGuncelle(s.urun_id, -1));
    el.querySelector('.arti').addEventListener('click', () => satirGuncelle(s.urun_id, +1));
    el.querySelector('.sil-btn').addEventListener('click', () => satirSil(s.urun_id));
    return el;
  }

  function ciz(){
    const sepet = buRestoranSepeti();

    if (!sepet.length){
      bosDurumGoster();
      return;
    }

    listeEl.innerHTML = '';
    sepet.forEach(s => listeEl.appendChild(satirOlustur(s)));

    notBlogu.style.display = 'block';
    onayBar.style.display = 'block';

    const toplamAdet = sepet.reduce((acc, s) => acc + s.adet, 0);
    const toplamTutar = sepet.reduce((acc, s) => acc + (s.fiyat * s.adet), 0);

    onayAdetEl.textContent = `${toplamAdet} ürün`;
    onayTutarEl.textContent = `${toplamTutar.toFixed(2)} ₺`;
  }

  // --- Sipariş gönderme ---
  async function siparisiGonder(){
    const sepet = buRestoranSepeti();
    if (!sepet.length) return;

    onaylaBtn.disabled = true;
    onaylaBtn.textContent = 'Gönderiliyor...';

    const toplamTutar = sepet.reduce((acc, s) => acc + (s.fiyat * s.adet), 0);

    // ŞABLON: boof_orders tablo kolon adlarını kendi şemana göre uyarlayabilirsin.
    const siparisPayload = {
      venue_id: restoranId,
      total_amount: Number(toplamTutar.toFixed(2)),
      note: notEl.value.trim() || null,
      items: sepet.map(s => ({
        urun_id: s.urun_id,
        isim: s.isim,
        adet: s.adet,
        birim_fiyat: s.fiyat
      })),
      status: 'yeni'
    };

    try{
      const { error } = await supabase
        .from('boof_orders')
        .insert(siparisPayload);

      if (error) throw error;

      // Başarılı: sadece bu restorana ait satırları sepetten temizle
      const kalanSepet = tumSepetiOku().filter(s => s.restoran_id !== restoranId);
      tumSepetiYaz(kalanSepet);

      onayOverlay.classList.add('gorunur');

    } catch(err){
      console.error('Sipariş gönderilemedi:', err);
      onaylaBtn.disabled = false;
      onaylaBtn.textContent = 'Siparişi Onayla ve Gönder';
      alert('Sipariş gönderilirken bir sorun oluştu, tekrar dener misin?');
    }
  }

  onaylaBtn.addEventListener('click', siparisiGonder);

  document.addEventListener('DOMContentLoaded', ciz);
</script>

</body>
</html>
