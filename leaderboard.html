<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boof - Liderlik Tablosu</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts: Syne + DM Sans -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * { font-family: 'DM Sans', sans-serif; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Syne', sans-serif; font-weight: 700; }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1a0a3e 100%);
            color: #e2e8f0;
            min-height: 100vh;
        }

        .glass-effect {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.2);
        }

        /* ===== Top Bar ===== */
        .top-bar {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            position: sticky;
            top: 0;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(148, 163, 184, 0.15);
            z-index: 30;
        }

        .back-btn {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.2);
            transition: all 0.25s ease;
            flex-shrink: 0;
        }

        .back-btn:hover {
            background: rgba(99, 102, 241, 0.15);
            border-color: rgba(99, 102, 241, 0.5);
        }

        /* ===== Hero Title ===== */
        .leaderboard-hero {
            text-align: center;
            padding: 1.5rem 1.5rem 1rem;
        }

        .leaderboard-hero h2 {
            font-size: 1.6rem;
            background: linear-gradient(135deg, #fbbf24 0%, #a78bfa 60%, #6366f1 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* ===== My Rank Summary Card ===== */
        .my-rank-card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(99, 102, 241, 0.35);
            border-radius: 16px;
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: 0 0 25px rgba(99, 102, 241, 0.15);
        }

        .my-rank-badge {
            width: 3rem;
            height: 3rem;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1 0%, #a78bfa 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-family: 'Syne', sans-serif;
            font-size: 1.1rem;
            color: white;
            flex-shrink: 0;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
        }

        /* ===== Podium ===== */
        .podium-wrap {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 0.75rem;
            padding: 2rem 1rem 1rem;
        }

        .podium-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 30%;
            max-width: 120px;
        }

        .podium-avatar {
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-family: 'Syne', sans-serif;
            font-size: 1.25rem;
            color: white;
            margin-bottom: 0.5rem;
            position: relative;
        }

        .podium-column.first .podium-avatar {
            width: 4.5rem;
            height: 4.5rem;
            font-size: 1.6rem;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.6);
            border: 2px solid rgba(251, 191, 36, 0.8);
        }

        .podium-column.second .podium-avatar {
            background: linear-gradient(135deg, #cbd5e1 0%, #94a3b8 100%);
            box-shadow: 0 0 20px rgba(203, 213, 225, 0.4);
        }

        .podium-column.third .podium-avatar {
            background: linear-gradient(135deg, #d97706 0%, #b45309 100%);
            box-shadow: 0 0 20px rgba(217, 119, 6, 0.4);
        }

        .crown-icon {
            position: absolute;
            top: -1.4rem;
            font-size: 1.5rem;
            filter: drop-shadow(0 0 6px rgba(251, 191, 36, 0.8));
        }

        .podium-username {
            font-size: 0.8rem;
            font-weight: 700;
            color: #e2e8f0;
            text-align: center;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .podium-points {
            font-size: 0.75rem;
            color: #fbbf24;
            font-weight: 700;
            margin-top: 0.15rem;
        }

        .podium-stand {
            width: 100%;
            border-radius: 10px 10px 0 0;
            margin-top: 0.75rem;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 0.5rem;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
        }

        .podium-column.first .podium-stand {
            height: 110px;
            background: linear-gradient(180deg, rgba(251,191,36,0.3) 0%, rgba(251,191,36,0.08) 100%);
            border: 1px solid rgba(251, 191, 36, 0.4);
            font-size: 1.75rem;
            color: #fbbf24;
        }

        .podium-column.second .podium-stand {
            height: 80px;
            background: linear-gradient(180deg, rgba(203,213,225,0.2) 0%, rgba(203,213,225,0.05) 100%);
            border: 1px solid rgba(203, 213, 225, 0.3);
            font-size: 1.4rem;
            color: #cbd5e1;
        }

        .podium-column.third .podium-stand {
            height: 60px;
            background: linear-gradient(180deg, rgba(217,119,6,0.25) 0%, rgba(217,119,6,0.05) 100%);
            border: 1px solid rgba(217, 119, 6, 0.35);
            font-size: 1.4rem;
            color: #d97706;
        }

        /* ===== List Rows (4th onward) ===== */
        .rank-row {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.15);
            border-radius: 14px;
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.85rem;
            transition: all 0.2s ease;
        }

        .rank-row:hover {
            border-color: rgba(99, 102, 241, 0.35);
            background: rgba(30, 41, 59, 0.7);
        }

        .rank-row.is-me {
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
        }

        .rank-number {
            width: 1.75rem;
            text-align: center;
            font-weight: 800;
            font-family: 'Syne', sans-serif;
            color: #94a3b8;
            flex-shrink: 0;
        }

        .rank-avatar {
            width: 2.25rem;
            height: 2.25rem;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1 0%, #a78bfa 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            color: white;
            flex-shrink: 0;
        }

        .role-badge-tag {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: 600;
            padding: 0.1rem 0.5rem;
            border-radius: 999px;
            margin-top: 0.1rem;
        }

        .badge-Kasif { background: rgba(99,102,241,0.15); color: #a5b4fc; }
        .badge-Gurme { background: rgba(251,191,36,0.15); color: #fcd34d; }
        .badge-Usta { background: rgba(34,197,94,0.15); color: #86efac; }
        .badge-Efsane { background: rgba(236,72,153,0.15); color: #f9a8d4; }

        .rank-points {
            font-weight: 800;
            font-family: 'Syne', sans-serif;
            color: #fbbf24;
            font-size: 0.95rem;
            flex-shrink: 0;
        }

        /* ===== Skeleton / Empty / Error ===== */
        .skeleton {
            background: linear-gradient(90deg, rgba(51,65,85,0.4) 25%, rgba(71,85,105,0.5) 37%, rgba(51,65,85,0.4) 63%);
            background-size: 400% 100%;
            animation: skeleton-loading 1.4s ease infinite;
            border-radius: 14px;
            height: 60px;
        }

        @keyframes skeleton-loading {
            0% { background-position: 100% 50%; }
            100% { background-position: 0 50%; }
        }

        .empty-state, .error-state {
            display: none;
            text-align: center;
            padding: 2.5rem 1rem;
            color: #94a3b8;
        }

        .empty-state.show, .error-state.show { display: block; }
    </style>
</head>
<body>

    <!-- ===== TOP BAR ===== -->
    <div class="top-bar">
        <button class="back-btn" onclick="window.history.back()" aria-label="Geri dön">
            <svg class="w-5 h-5 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
        </button>
        <h1 class="text-base font-bold text-slate-100">Liderlik Tablosu</h1>
    </div>

    <!-- ===== HERO TITLE ===== -->
    <section class="leaderboard-hero">
        <h2>🏆 Haftanın Boofer'ları</h2>
        <p class="text-xs text-slate-400 mt-1">Onaylı yorumlarınla puan topla, zirveye tırman!</p>
    </section>

    <main class="max-w-2xl mx-auto px-4 pb-8 space-y-6">

        <!-- ===== BENİM SIRALAMAM ===== -->
        <div class="my-rank-card" id="myRankCard">
            <div class="my-rank-badge" id="myRankNumber">—</div>
            <div class="flex-1 min-w-0">
                <p class="text-xs text-slate-400">Senin Sıralaman</p>
                <p class="font-bold text-slate-100 truncate" id="myRankUsername">Yükleniyor...</p>
            </div>
            <div class="text-right flex-shrink-0">
                <p class="text-lg font-bold text-amber-400" id="myRankPoints">—</p>
                <p class="text-xs text-slate-400">puan</p>
            </div>
        </div>

        <!-- ===== YÜKLENİYOR (Skeleton) ===== -->
        <div id="leaderboardLoading" class="space-y-3">
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
            <div class="skeleton"></div>
        </div>

        <!-- ===== PODYUM (İlk 3) ===== -->
        <div class="podium-wrap hidden" id="podiumWrap"></div>

        <!-- ===== LİSTE (4. sıradan itibaren) ===== -->
        <div class="space-y-2.5 hidden" id="rankList"></div>

        <!-- ===== EMPTY / ERROR ===== -->
        <div class="empty-state" id="emptyState">
            <div class="text-3xl mb-2">🏁</div>
            <p class="font-semibold text-slate-300 text-sm">Henüz kimse sıralamada yer almıyor</p>
            <p class="text-xs mt-1">İlk onaylı yorumunu yap ve zirveye adını yazdır!</p>
        </div>

        <div class="error-state" id="errorState">
            <div class="text-3xl mb-2">⚠️</div>
            <p class="font-semibold text-slate-300 text-sm">Liderlik tablosu yüklenemedi</p>
            <p class="text-xs mt-1" id="errorDetail"></p>
        </div>

        <p class="text-center text-xs text-slate-500 mt-6">
            © 2026 Highly - Her hakkı saklıdır.
        </p>
    </main>

    <!-- Supabase Client Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // ==========================================================
        // CONFIGURATION
        // ==========================================================
        const SUPABASE_URL = 'https://ttuxfivcwdpyvhmybbna.supabase.co';
        const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY_HERE'; // <-- Gerçek anon key ile değiştir

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Kaç kullanıcı gösterilecek (podyum + liste toplamı)
        const LEADERBOARD_LIMIT = 50;

        // ==========================================================
        // STATE
        // ==========================================================
        let leaderboardData = [];
        let currentUserId = null;

        // ==========================================================
        // ROZET MANTIĞI (client-side, placeholder)
        // ------------------------------------------------------------
        // NOT: profiles tablosunda ayrı bir "badge" sütunu yok.
        // Şimdilik total_xp eşiklerine göre basit bir rozet ataması
        // yapılıyor. İleride profiles'a bir "badge" sütunu eklenirse
        // bu fonksiyon yerine doğrudan o veri kullanılmalı.
        // ==========================================================
        function getBadgeForXp(xp) {
            if (xp >= 1000) return { label: 'Efsane', className: 'badge-Efsane' };
            if (xp >= 500) return { label: 'Usta', className: 'badge-Usta' };
            if (xp >= 150) return { label: 'Gurme', className: 'badge-Gurme' };
            return { label: 'Kaşif', className: 'badge-Kasif' };
        }

        // ==========================================================
        // SUPABASE: SIRALAMA VERİSİNİ ÇEKME
        // ==========================================================
        async function fetchLeaderboard() {
            // profiles tablosundan total_xp'ye göre çoktan aza sıralı liste
            const { data, error } = await supabase
                .from('profiles')
                .select('id, username, total_xp')
                .order('total_xp', { ascending: false })
                .limit(LEADERBOARD_LIMIT);

            if (error) throw error;

            return data || [];
        }

        async function fetchCurrentUserId() {
            const { data: { user } } = await supabase.auth.getUser();
            return user ? user.id : null;
        }

        // ==========================================================
        // RENDER: BENİM SIRALAMAM KARTI
        // ==========================================================
        function renderMyRankCard() {
            const myIndex = leaderboardData.findIndex(p => p.id === currentUserId);

            if (myIndex === -1) {
                document.getElementById('myRankNumber').textContent = '—';
                document.getElementById('myRankUsername').textContent = 'Henüz sıralamada değilsin';
                document.getElementById('myRankPoints').textContent = '0';
                return;
            }

            const me = leaderboardData[myIndex];
            document.getElementById('myRankNumber').textContent = `#${myIndex + 1}`;
            document.getElementById('myRankUsername').textContent = me.username || 'Kullanıcı';
            document.getElementById('myRankPoints').textContent = me.total_xp ?? 0;
        }

        // ==========================================================
        // RENDER: PODYUM (İlk 3)
        // ==========================================================
        function renderPodium(top3) {
            const wrap = document.getElementById('podiumWrap');

            // Görsel sıralama: 2. - 1. - 3. (ortada büyük olan 1.)
            const order = [top3[1], top3[0], top3[2]];
            const positionClasses = ['second', 'first', 'third'];
            const medalNumbers = [2, 1, 3];

            wrap.innerHTML = order.map((user, i) => {
                if (!user) return '';
                const posClass = positionClasses[i];
                const rankNum = medalNumbers[i];
                const initial = (user.username || 'U').charAt(0).toUpperCase();

                return `
                    <div class="podium-column ${posClass}">
                        <div class="podium-avatar">
                            ${rankNum === 1 ? '<span class="crown-icon">👑</span>' : ''}
                            ${escapeHtml(initial)}
                        </div>
                        <span class="podium-username">${escapeHtml(user.username || 'Kullanıcı')}</span>
                        <span class="podium-points">⭐ ${user.total_xp ?? 0}</span>
                        <div class="podium-stand">${rankNum}</div>
                    </div>
                `;
            }).join('');

            wrap.classList.remove('hidden');
        }

        // ==========================================================
        // RENDER: LİSTE (4. sıradan itibaren)
        // ==========================================================
        function renderRankList(restOfUsers, startIndex) {
            const listEl = document.getElementById('rankList');

            listEl.innerHTML = restOfUsers.map((user, i) => {
                const rank = startIndex + i + 1;
                const isMe = user.id === currentUserId;
                const initial = (user.username || 'U').charAt(0).toUpperCase();
                const badge = getBadgeForXp(user.total_xp || 0);

                return `
                    <div class="rank-row ${isMe ? 'is-me' : ''}">
                        <span class="rank-number">#${rank}</span>
                        <div class="rank-avatar">${escapeHtml(initial)}</div>
                        <div class="flex-1 min-w-0">
                            <p class="font-semibold text-sm text-slate-100 truncate">${escapeHtml(user.username || 'Kullanıcı')}</p>
                            <span class="role-badge-tag ${badge.className}">${badge.label}</span>
                        </div>
                        <span class="rank-points">${user.total_xp ?? 0}</span>
                    </div>
                `;
            }).join('');

            listEl.classList.remove('hidden');
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str || '';
            return div.innerHTML;
        }

        // ==========================================================
        // VERİ YÜKLEME AKIŞI
        // ==========================================================
        async function loadLeaderboard() {
            try {
                const [data, userId] = await Promise.all([
                    fetchLeaderboard(),
                    fetchCurrentUserId()
                ]);

                leaderboardData = data;
                currentUserId = userId;

                document.getElementById('leaderboardLoading').classList.add('hidden');

                if (!leaderboardData.length) {
                    document.getElementById('emptyState').classList.add('show');
                    return;
                }

                renderMyRankCard();

                const top3 = leaderboardData.slice(0, 3);
                const rest = leaderboardData.slice(3);

                renderPodium(top3);

                if (rest.length) {
                    renderRankList(rest, 3);
                }

            } catch (err) {
                console.error('Liderlik tablosu yüklenirken hata:', err);
                document.getElementById('leaderboardLoading').classList.add('hidden');
                document.getElementById('errorState').classList.add('show');
                document.getElementById('errorDetail').textContent = err.message || 'Bilinmeyen hata';
            }
        }

        // ==========================================================
        // BAŞLANGIÇ
        // ==========================================================
        document.addEventListener('DOMContentLoaded', () => {
            loadLeaderboard();
        });
    </script>
</body>
</html>
