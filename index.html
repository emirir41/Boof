<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boof | Highly</title>

<!-- Fontlar: Highly marka sistemi -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400..800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root{
    --bg: #0a0a0f;
    --bg-elev: #101018;
    --glass: rgba(255,255,255,0.05);
    --glass-border: rgba(255,255,255,0.10);
    --indigo: #6366f1;
    --violet: #8b5cf6;
    --text: #f2f2f7;
    --text-dim: #9797a8;
    --danger: #ef4444;
    --radius: 20px;
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  body{
    background:
      radial-gradient(circle at 15% 0%, rgba(99,102,241,0.16), transparent 45%),
      radial-gradient(circle at 85% 20%, rgba(139,92,246,0.14), transparent 40%),
      var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  header{
    padding: 48px 24px 32px;
    text-align: center;
  }

  .star{
    color: var(--violet);
    font-size: 22px;
    display:block;
    margin-bottom: 10px;
  }

  h1{
    font-family:'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(32px, 6vw, 48px);
    letter-spacing: -0.02em;
    background: linear-gradient(90deg, #fff, #c4c4ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  header p{
    color: var(--text-dim);
    margin-top: 10px;
    font-size: 15px;
  }

  .search-wrap{
    max-width: 480px;
    margin: 28px auto 0;
    padding: 0 24px;
  }

  #arama{
    width: 100%;
    padding: 14px 18px;
    border-radius: 14px;
    border: 1px solid var(--glass-border);
    background: var(--glass);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    backdrop-filter: blur(12px);
    outline: none;
    transition: border-color .2s;
  }
  #arama:focus{ border-color: var(--indigo); }
  #arama::placeholder{ color: var(--text-dim); }

  main{
    max-width: 1100px;
    margin: 40px auto 0;
    padding: 0 24px;
  }

  #restoranlar-listesi{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
  }

  .card{
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    overflow: hidden;
    backdrop-filter: blur(14px);
    display: flex;
    flex-direction: column;
    transition: transform .2s ease, border-color .2s ease;
  }
  .card:hover{
    transform: translateY(-4px);
    border-color: rgba(139,92,246,0.4);
  }

  .card-img{
    width: 100%;
    aspect-ratio: 16/10;
    object-fit: cover;
    background: linear-gradient(135deg, #1a1a24, #23233a);
  }

  .card-body{
    padding: 18px 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
  }

  .card-body h3{
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 18px;
  }

  .meta-row{
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-dim);
    font-size: 13px;
  }

  .rating{
    color: #facc15;
    font-weight: 700;
  }

  .btn-row{
    display: flex;
    gap: 8px;
    margin-top: 14px;
  }

  .btn{
    flex: 1;
    text-align: center;
    padding: 11px 10px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 700;
    text-decoration: none;
    transition: opacity .2s, transform .15s;
  }
  .btn:active{ transform: scale(0.97); }

  .btn-primary{
    background: linear-gradient(90deg, var(--indigo), var(--violet));
    color: #fff;
  }
  .btn-primary:hover{ opacity: .9; }

  .btn-secondary{
    background: transparent;
    border: 1px solid var(--glass-border);
    color: var(--text);
  }
  .btn-secondary:hover{ border-color: var(--indigo); }

  /* Durum ekranları */
  .state{
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    grid-column: 1 / -1;
  }
  .state .star{ margin-bottom: 14px; }
  .state h3{
    font-family:'Syne', sans-serif;
    color: var(--text);
    font-size: 18px;
    margin-bottom: 6px;
  }

  .skeleton{
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    height: 260px;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ opacity: .5; }
    50%{ opacity: .9; }
  }

  @media (prefers-reduced-motion: reduce){
    .card, .btn{ transition: none; }
    .skeleton{ animation: none; }
  }
</style>
</head>
<body>

<header>
  <span class="star">✦</span>
  <h1>Boof</h1>
  <p>Highly ekosisteminden gel-al ve rezervasyon platformu</p>
</header>

<div class="search-wrap">
  <input type="text" id="arama" placeholder="Dükkan veya mutfak ara...">
</div>

<main>
  <div id="restoranlar-listesi">
    <!-- Yüklenirken iskelet kartlar -->
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>
</main>

<script>
  // --- Supabase bağlantısı ---
  // NOT: SUPABASE_URL ve SUPABASE_ANON_KEY kendi projenle değiştirilmeli.
  const SUPABASE_URL = 'https://ttuxfivcwdpyvhmybbna.supabase.co';
  const SUPABASE_ANON_KEY = 'SENIN_ANON_KEY_BURAYA';

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const listeEl = document.getElementById('restoranlar-listesi');
  const aramaEl = document.getElementById('arama');

  let tumRestoranlar = [];

  function durumGoster(baslik, aciklama){
    listeEl.innerHTML = `
      <div class="state">
        <span class="star">✦</span>
        <h3>${baslik}</h3>
        <p>${aciklama}</p>
      </div>`;
  }

  function kartOlustur(r){
    // ID'yi hem sayfaya taşırken hem karşılarken güvenli kullanmak için
    // string'e çeviriyoruz; alıcı taraf (gelal.html) Number() ile geri çevirecek.
    const id = String(r.id);
    const gorsel = r.gorsel_url || '';
    const isim = r.isim || 'İsimsiz Dükkan';
    const kategori = r.kategori || 'Genel';
    const puan = r.puan != null ? Number(r.puan).toFixed(1) : '—';

    const kart = document.createElement('div');
    kart.className = 'card';
    kart.innerHTML = `
      <img class="card-img" src="${gorsel}" alt="${isim}" loading="lazy"
           onerror="this.style.display='none'">
      <div class="card-body">
        <h3>${isim}</h3>
        <div class="meta-row">
          <span>${kategori}</span>
          <span>·</span>
          <span class="rating">★ ${puan}</span>
        </div>
        <div class="btn-row">
          <a class="btn btn-primary" href="gelal.html?restoran_id=${encodeURIComponent(id)}">Gel-Al Sipariş</a>
          <a class="btn btn-secondary" href="rezervasyon.html?restoran_id=${encodeURIComponent(id)}">Rezervasyon Yap</a>
        </div>
      </div>`;
    return kart;
  }

  function listeyiCiz(restoranlar){
    listeEl.innerHTML = '';
    if (!restoranlar.length){
      durumGoster('Sonuç bulunamadı', 'Aramanı değiştirip tekrar dene.');
      return;
    }
    restoranlar.forEach(r => listeEl.appendChild(kartOlustur(r)));
  }

  async function restoranlariGetir(){
    try{
      const { data, error } = await supabase
        .from('boof_venues')
        .select('*')
        .eq('aktif', true)
        .order('id', { ascending: true });

      if (error) throw error;

      tumRestoranlar = data || [];
      listeyiCiz(tumRestoranlar);

    } catch(err){
      console.error('Restoranlar çekilemedi:', err);
      durumGoster('Bir şeyler ters gitti', 'Dükkanlar yüklenemedi, sayfayı yenilemeyi dene.');
    }
  }

  aramaEl.addEventListener('input', () => {
    const q = aramaEl.value.trim().toLocaleLowerCase('tr');
    if (!q){
      listeyiCiz(tumRestoranlar);
      return;
    }
    const filtreli = tumRestoranlar.filter(r =>
      (r.isim || '').toLocaleLowerCase('tr').includes(q) ||
      (r.kategori || '').toLocaleLowerCase('tr').includes(q)
    );
    listeyiCiz(filtreli);
  });

  document.addEventListener('DOMContentLoaded', restoranlariGetir);
</script>

</body>
</html>
